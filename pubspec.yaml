name: kigali_city_services
description: "Kigali City - Find the best services near you"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase (updated to March 2026 latest)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

  # State management
  provider: ^6.1.2

  # Maps
  google_maps_flutter: ^2.15.0

  # Utilities
  url_launcher: ^6.3.2
  intl: ^0.19.0
  geolocator: ^14.0.2 # ← NEW: for real "NearYou" distances (0.6 km etc.)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
